name: Automatic Data Preprocessing

on:
  push:
    branches:
      - main

  workflow_dispatch:

jobs:
  preprocessing:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Preprocessing
        run: |
          python preprocessing/automate_kharis-syaban.py \
            dataset/diabetes_data.csv \
            preprocessing/preprocessed_diabetes_data.csv

      - name: Verify Output
        run: |
          ls -lah preprocessing/
          test -f preprocessing/preprocessed_diabetes_data.csv

      - name: Upload Preprocessed Dataset
        uses: actions/upload-artifact@v4
        with:
          name: preprocessed-dataset
          path: preprocessing/preprocessed_diabetes_data.csv